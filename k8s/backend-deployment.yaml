apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebase-architect-backend
  namespace: codebase-architect
  labels:
    app: codebase-architect
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codebase-architect
      component: backend
  template:
    metadata:
      labels:
        app: codebase-architect
        component: backend
    spec:
      # Service account for RBAC
      serviceAccountName: codebase-architect-backend
      
      # Pod security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: backend
        image: your-registry.azurecr.io/codebase-architect-backend:latest
        imagePullPolicy: IfNotPresent
        
        # Container ports
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Environment variables from ConfigMap and Secret
        envFrom:
        - configMapRef:
            name: codebase-architect-config
        - secretRef:
            name: codebase-architect-secrets
        
        # Resource limits and requests
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: temp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      
      # Volumes
      volumes:
      - name: temp
        emptyDir: {}
      - name: cache
        persistentVolumeClaim:
          claimName: codebase-architect-pvc
      
      # Node affinity (optional)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - codebase-architect
              topologyKey: kubernetes.io/hostname
