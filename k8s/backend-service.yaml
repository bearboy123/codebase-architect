apiVersion: v1
kind: Service
metadata:
  name: codebase-architect-backend
  namespace: codebase-architect
  labels:
    app: codebase-architect
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: codebase-architect
    component: backend
  sessionAffinity: None
