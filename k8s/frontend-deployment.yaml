apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebase-architect-frontend
  namespace: codebase-architect
  labels:
    app: codebase-architect
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codebase-architect
      component: frontend
  template:
    metadata:
      labels:
        app: codebase-architect
        component: frontend
    spec:
      # Service account for RBAC
      serviceAccountName: codebase-architect-frontend
      
      # Pod security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: frontend
        image: codebase-architect-frontend:latest
        imagePullPolicy: Never
        
        # Container ports
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        # Environment variables
        env:
        - name: VITE_API_URL
          value: "http://codebase-architect-backend:8000"
        
        # Resource limits and requests
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      
      # Node affinity (optional)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - codebase-architect
              topologyKey: kubernetes.io/hostname
