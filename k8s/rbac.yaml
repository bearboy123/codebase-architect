apiVersion: v1
kind: ServiceAccount
metadata:
  name: codebase-architect-backend
  namespace: codebase-architect
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codebase-architect-backend
  namespace: codebase-architect
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codebase-architect-backend
  namespace: codebase-architect
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codebase-architect-backend
subjects:
- kind: ServiceAccount
  name: codebase-architect-backend
  namespace: codebase-architect
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codebase-architect-frontend
  namespace: codebase-architect
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codebase-architect-frontend
  namespace: codebase-architect
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codebase-architect-frontend
  namespace: codebase-architect
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codebase-architect-frontend
subjects:
- kind: ServiceAccount
  name: codebase-architect-frontend
  namespace: codebase-architect
