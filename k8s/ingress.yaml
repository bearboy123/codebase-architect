apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codebase-architect-ingress
  namespace: codebase-architect
  annotations:
    # For Azure Application Gateway
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    
    # For NGINX Ingress Controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
  - hosts:
    - codebase-architect.example.com
    - api.codebase-architect.example.com
    secretName: codebase-architect-tls
  rules:
  - host: codebase-architect.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: codebase-architect-frontend
            port:
              number: 3000
  - host: api.codebase-architect.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: codebase-architect-backend
            port:
              number: 8000
