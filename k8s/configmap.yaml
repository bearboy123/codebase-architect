apiVersion: v1
kind: ConfigMap
metadata:
  name: codebase-architect-config
  namespace: codebase-architect
data:
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  DEBUG: "false"
  FRONTEND_URL: "http://codebase-architect.local"
  MAX_ANALYSIS_TIME_SECONDS: "300"
  MAX_FILE_SIZE_MB: "50"
  ANALYZE_HIDDEN_FILES: "false"
  AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
  AZURE_OPENAI_MODEL_DEPLOYMENT: "gpt-4"
