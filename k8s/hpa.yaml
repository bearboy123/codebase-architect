apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codebase-architect-backend-hpa
  namespace: codebase-architect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codebase-architect-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codebase-architect-frontend-hpa
  namespace: codebase-architect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codebase-architect-frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
